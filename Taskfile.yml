version: "3"

tasks:
  sync:
    desc: Install project dependencies in a local uv-managed environment
    cmds:
      - uv sync --extra dev --locked

  test:
    desc: Run unit tests
    cmds:
      - uv run pytest

  lint:
    desc: Run static checks
    cmds:
      - uv run ruff check .
      - uv run mypy src

  build:
    desc: Build wheel and sdist artifacts
    cmds:
      - uv build

  install-wheel:
    desc: Install the built wheel into a throwaway virtual environment
    cmds:
      - uv run python -m venv .venv-wheel
      - .\.venv-wheel\Scripts\python -m pip install --upgrade pip
      - .\.venv-wheel\Scripts\python -m pip install dist\*.whl
      - .\.venv-wheel\Scripts\sm --version

  run:
    desc: Run the CLI
    cmds:
      - uv run sm {{.CLI_ARGS}}

  docs:
    desc: Build documentation
    cmds:
      - uv run mkdocs build

  lock:
    desc: Refresh the dependency lockfile
    cmds:
      - uv lock
