name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Validate tag/version contract
        run: python .github/scripts/check_release_tag.py

      - name: Sync dependencies
        run: uv sync --extra dev --locked

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src

      - name: Test
        run: uv run pytest

      - name: Build artifacts
        run: uv build

      - name: Verify wheel installability
        run: |
          python -m venv .venv-wheel
          . .venv-wheel/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          sm --version
          sm version
          sm list tests

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

      - name: Publish to PyPI with trusted publishing
        if: ${{ vars.PUBLISH_TO_PYPI == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Publish to internal index
        if: ${{ vars.INTERNAL_PYPI_REPOSITORY_URL != '' && secrets.INTERNAL_PYPI_TOKEN != '' }}
        env:
          TWINE_REPOSITORY_URL: ${{ vars.INTERNAL_PYPI_REPOSITORY_URL }}
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.INTERNAL_PYPI_TOKEN }}
        run: |
          python -m pip install twine
          twine upload dist/*
